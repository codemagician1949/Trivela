name: Load tests (manual)

# Run k6 against a target environment on demand. Deliberately not part of
# the per-PR CI to keep iteration fast and to avoid hammering staging.

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Which load scenario to run'
        required: true
        default: 'read-campaigns'
        type: choice
        options:
          - read-campaigns
          - write-campaigns
          - mixed-read-write
      base_url:
        description: 'Backend URL (e.g. https://staging.trivela.dev)'
        required: true
        default: 'http://localhost:3001'
      api_key:
        description: 'API key for write scenarios (leave blank for reads)'
        required: false
        default: ''

jobs:
  load-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo 'deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main' | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run scenario
        env:
          BASE_URL: ${{ inputs.base_url }}
          API_KEY: ${{ inputs.api_key }}
        run: k6 run "load-tests/scenarios/${{ inputs.scenario }}.js"
